<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Recolección CB - ebanicMX</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        .aviso-box { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9em; }
        .pago-box { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9em; text-align: center; }
        .pago-box h3 { margin-top: 0; color: #2e7d32; font-size: 1.1em; }
        
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        
        #info-sucursal { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 15px; display: none; font-size: 0.9em; color: #555; }
        
        button#btn-wa { width: 100%; background-color: #25d366; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; display: none; }
        
        dialog { border: none; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); width: 85%; max-width: 300px; }
        .modal-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .modal-buttons button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-confirm { background-color: #25d366; color: white; }
        .btn-cancel { background-color: #eee; color: #333; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Recolección CB</h2>
        
        <div class="aviso-box">
            <strong>⚠️ Aviso importante:</strong><br>
            1. Realiza tu pago (artículo + $20.00 envío).<br>
            2. <strong>Envía la imagen de tu comprobante por WhatsApp</strong> para confirmar.
        </div>

        <div class="pago-box">
            <h3>Método de Pago</h3>
            <p>Paga en OXXO o desde tu App Bancaria:</p>
            <strong>BBVA</strong><br>
            <span style="font-size: 1.2em; font-weight: bold;">4152-3144-8467-6336</span>
        </div>
        
        <form id="formulario">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" placeholder="Tu nombre completo" oninput="validarFormulario()" required>

            <label for="selector">Sucursal de recolección:</label>
            <select id="selector" onchange="mostrarSucursal()" required>
                <option value="">-- Selecciona una sucursal --</option>
            </select>
        </form>

        <div id="info-sucursal">
            <div id="texto-info"></div>
        </div>

        <button id="btn-wa" onclick="abrirConfirmacion()">Enviar solicitud</button>
    </div>

    <dialog id="modalConfirmacion">
        <h3>¿Confirmas tus datos?</h3>
        <p id="resumen-datos"></p>
        <div class="modal-buttons">
            <button class="btn-confirm" onclick="irAWhatsApp()">Confirmar y Enviar</button>
            <button class="btn-cancel" onclick="document.getElementById('modalConfirmacion').close()">Editar</button>
        </div>
    </dialog>

    <script>
        const sucursales = [
            { nombre: "Matriz Juarez", dir: "Pedro Moreno #776-B, Centro Guadalajara", horario: "L-V 11am-8pm, Sáb 10am-5pm, Dom 11am-3pm" },
            { nombre: "Norte", dir: "Calzada Federalismo #690, Auditorio Zapopan", horario: "L-V 11am-8pm, Sáb 11am-5pm" },
            { nombre: "Zapopan", dir: "Av. Hidalgo #241, Centro Zapopan", horario: "L-V 11am-7pm, Sáb 11am-5pm" },
            { nombre: "Sur", dir: "Av. Cristobal Colon #6020, Sta María Tequepexpan, Tlaquepaque", horario: "L-V 11am-7pm, Sáb 11am-5pm" },
            { nombre: "Tetlan", dir: "Av. Presa laurel #118 L4, En gasolinera Pemex, Tetlán Gdl", horario: "L-V 11am-6pm, Sáb 11am-5pm" },
            { nombre: "Tlajomulco", dir: "Centro comercial san Sebastián #1915-1, Local F2, arriba de Coppel", horario: "L-V 11am-6pm, Sáb 11am-5pm" },
            { nombre: "Oblatos", dir: "Av. Artesanos #1135, Circunvalación Oblatos, Guadalajara", horario: "L-V 11am-7pm, Sáb 11am-5pm" },
            { nombre: "Tonala", dir: "Nicolás bravo #40 D, Centro Tonalá", horario: "L-V 11am-6pm, Sáb 11am-5pm" },
            { nombre: "Tesistan", dir: "Av. Palmas #3420, Palermo Zapopan", horario: "L-V 11am-7pm, Sáb 11am-5pm" },
            { nombre: "Parián Tlaquepaque", dir: "Plaza Cumbres, Av. Rio Nilo 2329 Local 2 PB, Entrada por Ramon Lopez V.", horario: "L-V 11am-6pm, Sáb 11am-5pm" },
            { nombre: "Aviacion", dir: "Av. Base aérea #980, Nuevo Mexico Zapopan", horario: "L-V 11am-7pm, Sáb 11am-5pm" }
        ];

        const select = document.getElementById('selector');
        sucursales.forEach((s, i) => select.innerHTML += `<option value="${i}">${s.nombre}</option>`);

        function mostrarSucursal() {
            const index = select.value;
            const infoDiv = document.getElementById('info-sucursal');
            const textoInfo = document.getElementById('texto-info');
            
            if (index !== "") {
                const s = sucursales[index];
                infoDiv.style.display = "block";
                textoInfo.innerHTML = `<strong>${s.nombre}</strong><br>Dirección: ${s.dir}<br>Horario: ${s.horario}`;
            } else {
                infoDiv.style.display = "none";
            }
            validarFormulario();
        }

        function validarFormulario() {
            const nombre = document.getElementById('nombre').value;
            const btn = document.getElementById('btn-wa');
            btn.style.display = (nombre.trim() !== "" && select.value !== "") ? "block" : "none";
        }

        function abrirConfirmacion() {
            const nombre = document.getElementById('nombre').value;
            const sucursal = sucursales[select.value].nombre;
            document.getElementById('resumen-datos').innerHTML = `<strong>Nombre:</strong> ${nombre}<br><strong>Sucursal:</strong> ${sucursal}`;
            document.getElementById('modalConfirmacion').showModal();
        }

        function irAWhatsApp() {
            const nombre = document.getElementById('nombre').value;
            const sucursal = sucursales[select.value].nombre;
            const mensaje = encodeURIComponent(`Hola, mi nombre es ${nombre}. Deseo realizar una recolección en la sucursal: ${sucursal}. Confirmo el pago del artículo + $20 de envío y adjunto mi comprobante.`);
            
            window.open(`https://wa.me/523318297670?text=${mensaje}`, '_blank');
            
            document.getElementById('formulario').reset();
            document.getElementById('info-sucursal').style.display = "none";
            document.getElementById('btn-wa').style.display = "none";
            document.getElementById('modalConfirmacion').close();
        }
    </script>
</body>
</html>
